server:
  port: 8080

spring:
  application:
    name: weekly-report-generator

  datasource:
    url: jdbc:mysql://localhost:3306/weekly_report_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Sandu@123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 5MB

app:
  jwt:
    # In production, load this from an environment variable / secret manager.
    secret: ${JWT_SECRET:this-is-a-dev-only-secret-key-please-change-me-before-deploying-1234567890}
    expiration-ms: 86400000 # 24 hours

  cors:
    allowed-origins: ${CORS_ORIGIN:http://localhost:5173}

  ai:
    # Optional - only needed for the "Good to Have" AI Chat Assistant feature.
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    model: claude-sonnet-4-6

logging:
  level:
    root: INFO
    com.wrg: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: INFO
